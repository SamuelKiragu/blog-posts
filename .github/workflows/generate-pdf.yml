name: generate pdf

on:
  workflow_dispatch:
    inputs:
      year:
        description: 'Year to generate PDF for (e.g. 2026)'
        required: true
        type: string

jobs:
  create-pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pandoc
        run: bash .github/scripts/install_pandoc

      - name: Generate PDF for ${{ github.event.inputs.year }}
        run: bash .github/scripts/generate_pdf "${{ github.event.inputs.year }}"

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: blog-posts-${{ github.event.inputs.year }}
          path: ${{ github.event.inputs.year }}.pdf

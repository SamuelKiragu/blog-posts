name: generate pdf

on:
  workflow_dispatch:
    inputs:
      year:
        description: 'Year to generate PDF for (e.g. 2026)'
        required: true
        type: string

jobs:
  create-pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pandoc
        run: |
          set -e
          PANDOC_VERSION=$(curl -sSL --fail https://api.github.com/repos/jgm/pandoc/releases/latest | grep '"tag_name"' | sed -E 's/.*"([^"]+)".*/\1/')
          curl -sSL --fail "https://github.com/jgm/pandoc/releases/download/${PANDOC_VERSION}/pandoc-${PANDOC_VERSION}-1-amd64.deb" -o pandoc.deb
          sudo dpkg -i pandoc.deb

      - name: Generate PDF for ${{ github.event.inputs.year }}
        run: |
          set -e
          YEAR="${{ github.event.inputs.year }}"
          if [ ! -d "$YEAR" ]; then
            echo "Error: Directory '$YEAR' does not exist."
            exit 1
          fi
          mapfile -t MD_FILES < <(find "$YEAR" -maxdepth 1 -name "*.md" | sort)
          if [ "${#MD_FILES[@]}" -eq 0 ]; then
            echo "Error: No markdown files found in '$YEAR'."
            exit 1
          fi
          pandoc "${MD_FILES[@]}" \
            --from markdown \
            --to pdf \
            --output "$YEAR.pdf"

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: blog-posts-${{ github.event.inputs.year }}
          path: ${{ github.event.inputs.year }}.pdf
